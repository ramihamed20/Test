  a:"Urea and guanidine hydrochloride are CHAOTROPIC AGENTS that disrupt HYDROGEN BONDS throughout the protein structure → global unfolding. Used in laboratory protein denaturation experiments.",
  note:"Urea at 8M concentration can completely denature most proteins. Combined with β-ME (to break disulfide bonds), it gives full chemical denaturation." },

{ cat:"denaturation", lec:"l6",
  q:"How do heavy metals denature proteins?",
  a:"Heavy metals (Lead, Mercury, Silver) bind to –SH (thiol/sulfhydryl) groups of cysteine residues → prevent disulfide bond formation → distort protein structure → denaturation. This is the basis for their TOXIC effects.",
  note:"This is why heavy metal poisoning is so dangerous — critical enzymes (with –SH groups) are inactivated. Mercury poisoning disrupts neurological enzymes." },

{ cat:"denaturation", lec:"l6",
  q:"Compare REVERSIBLE vs. IRREVERSIBLE denaturation.",
  a:"REVERSIBLE: Remove the denaturant → protein REFOLDS to native structure (renaturation). Classic: RNase A refolding (Anfinsen experiment). IRREVERSIBLE: Aggregation or precipitation → protein CANNOT refold. Classic: Cooked egg white.",
  note:"Whether denaturation is reversible depends on: (1) Protein complexity, (2) Environmental conditions, (3) Presence of CHAPERONES." },

{ cat:"denaturation", lec:"l6",
  q:"What role do CHAPERONES play in protein denaturation/renaturation?",
  a:"Chaperones are proteins that ASSIST correct protein refolding by: preventing misfolding, preventing aggregation, and helping refold stress-denatured proteins. They do NOT determine the final structure — the amino acid sequence does.",
  note:"Chaperones are the deciding factor between reversible and irreversible denaturation in vivo. Without chaperones, even mild denaturation can lead to aggregation in the crowded cellular environment." },

// ── AGENTS OF DENATURATION (10) ────────────────────────────────────
{ cat:"agents", lec:"l6",
  q:"List the 5 physical agents of denaturation.",
  a:"I. Heat (most common) | II. Cold (rare — cold denaturation via hydrophobic changes) | III. Mechanical agitation (shaking/stirring) | IV. High pressure (food preservation) | V. Radiation (UV/X-ray — bond breaking → unfolding)",
  note:"Heat is clinically most relevant: fever, hot sterilization. Mechanical agitation: foam in egg whites. UV radiation: basis for UV sterilization." },

{ cat:"agents", lec:"l6",
  q:"How does ethanol (organic solvent) denature proteins?",
  a:"Ethanol disrupts HYDROPHOBIC INTERACTIONS in the protein core → protein unfolds. This is why 70% ethanol is used as a DISINFECTANT — it denatures bacterial membrane and cytoplasmic proteins effectively.",
  note:"TRAP: 70% ethanol is MORE effective than 100% ethanol as a disinfectant because water helps ethanol penetrate bacterial membranes." },

{ cat:"agents", lec:"l6",
  q:"Which bond does each chemical agent primarily target?",
  a:"pH changes → Ionic/electrostatic bonds | Organic solvents (ethanol) → Hydrophobic interactions | Detergents (SDS) → Hydrophobic interactions | Chaotropes (urea) → Hydrogen bonds | Reducing agents (β-ME) → Disulfide bonds (S–S, covalent) | Heavy metals → –SH groups",
  note:"Master this table — it is a classic exam question. DISULFIDE BONDS are the only COVALENT bonds broken — only by reducing agents." },

{ cat:"agents", lec:"l6",
  q:"What is cold denaturation and when does it occur?",
  a:"Cold denaturation occurs at very LOW TEMPERATURES in some proteins due to changes in HYDROPHOBIC INTERACTIONS (which weaken at low temperatures — water becomes better at accommodating hydrophobic groups). It is RARE.",
  note:"Most proteins denature at high temperatures. Cold denaturation is an exception seen in some multi-domain proteins. The mechanism is weakening of the hydrophobic effect at low temperatures." },

{ cat:"agents", lec:"l6",
  q:"What is the dental relevance of denaturation agents?",
  a:"1. Bacterial acid (↓ pH) in dental plaque denatures salivary proteins and enzymes. 2. Ethanol in mouthwash acts as antiseptic by denaturing bacterial proteins. 3. Autoclave sterilization (heat) denatures all proteins in dental instruments. 4. Heavy metal toxicity can inactivate oral enzymes.",
  note:"Clinical connection: mouth rinses with alcohol (15–26%) denature bacterial proteins. High-temperature autoclave sterilizes instruments by protein denaturation." },

{ cat:"agents", lec:"l6",
  q:"Why is guanidine hydrochloride a more powerful denaturant than urea?",
  a:"Both are chaotropic agents that disrupt hydrogen bonds, but GUANIDINE HCl is a STRONGER chaotrope because it is fully charged (positively) in addition to disrupting H-bonds → greater disruption of protein structure. Used at 6M vs 8M urea for complete denaturation.",
  note:"In lab practice: 6M guanidine HCl ≈ 8M urea in denaturing power. Both are used with reducing agents (β-ME/DTT) when complete denaturation (including disulfide bond breaking) is needed." },

{ cat:"agents", lec:"l6",
  q:"How does high pressure denature proteins?",
  a:"HIGH PRESSURE destabilizes the protein's 3D structure by compressing the protein — disrupting hydrophobic interactions and causing volume changes in the protein core. Used in FOOD PRESERVATION and STERILIZATION as an alternative to heat.",
  note:"High-pressure processing (HPP) of food: kills bacteria by denaturing their proteins without using heat, preserving food flavor and nutrients. Applied pressures: 100–1000 MPa." },

{ cat:"agents", lec:"l6",
  q:"How does UV/X-ray radiation denature proteins?",
  a:"UV and X-ray RADIATION break chemical bonds in the protein → unfolding. UV specifically: can break disulfide bonds and oxidize aromatic amino acids (Trp, Phe, Tyr). X-rays: more energetic → more extensive bond breaking.",
  note:"Used in: UV sterilization of lab surfaces, radiation therapy (cancer treatment disrupts tumor cell proteins), and food irradiation for preservation." },

{ cat:"agents", lec:"l6",
  q:"What is mechanical agitation denaturation?",
  a:"SHAKING or STIRRING creates physical forces that disrupt the protein's 3D structure. Classic example: formation of FOAM/MERINGUE from egg whites — mechanical whipping unfolds albumin proteins which then trap air bubbles.",
  note:"This is why lab protocols say 'do not vortex' certain proteins — vigorous mixing can denature them. Gentle rocking or slow stirring is preferred for sensitive proteins." },

{ cat:"agents", lec:"l6",
  q:"Compare all denaturation agents by bond targeted — summary table.",
  a:"Bond | Agent | Covalent?\nH-bonds | Heat, urea, pH | No\nIonic bonds | pH changes | No\nHydrophobic | SDS, solvents | No\nVan der Waals | Temperature | No\nDisulfide (S–S) | β-ME, DTT only | YES (covalent)\n–SH groups | Heavy metals | No",
  note:"CRITICAL EXAM POINT: Disulfide bonds are the ONLY covalent interactions broken during denaturation — and ONLY by reducing agents (β-ME or DTT). Everything else is non-covalent." },

// ── PROTEIN CLASSIFICATION (10) ────────────────────────────────────
{ cat:"classif6", lec:"l6",
  q:"What are simple proteins and give 3 examples.",
  a:"Simple proteins yield ONLY AMINO ACIDS on hydrolysis. They have NO prosthetic group. Examples: 1. Albumins (serum albumin) — soluble, transport protein. 2. Globulins (immunoglobulins) — antibodies. 3. Histones — bind DNA. 4. Keratin — structural (hair, nails).",
  note:"TRAP: Even though keratin is a simple protein, it is fibrous. Even though albumin is a simple protein, it is globular. Simple/conjugated is about composition; fibrous/globular is about shape." },

{ cat:"classif6", lec:"l6",
  q:"What are conjugated proteins? Name 5 types by prosthetic group.",
  a:"Conjugated proteins = APOPROTEIN + NON-PROTEIN PROSTHETIC GROUP.\n1. Nucleoproteins → nucleic acids (chromatin, ribosomes).\n2. Glycoproteins → carbohydrate (hormones, blood groups).\n3. Lipoproteins → lipid (LDL, HDL).\n4. Metalloproteins → metal ion (hemoglobin Fe²⁺).\n5. Phosphoproteins → phosphate (casein).",
  note:"The prosthetic group is ESSENTIAL for function. Apoprotein alone is often inactive. Examples: hemoglobin without heme cannot carry O₂; casein without phosphate changes its calcium-binding properties." },

{ cat:"classif6", lec:"l6",
  q:"LDL and HDL are examples of which conjugated protein type?",
  a:"LDL (Low-Density Lipoprotein) and HDL (High-Density Lipoprotein) are LIPOPROTEINS — conjugated proteins where LIPID is the prosthetic group. LDL carries cholesterol to tissues; HDL removes it from tissues (reverse cholesterol transport).",
  note:"CLINICAL: High LDL = atherosclerosis risk. High HDL = protective. The density difference: HDL has more protein (denser); LDL has more lipid (less dense)." },

{ cat:"classif6", lec:"l6",
  q:"Compare fibrous vs. globular proteins.",
  a:"FIBROUS: Long, rod-like shape | INSOLUBLE in water | STRUCTURAL role | Examples: Collagen, Elastin, Keratin, Fibrin.\nGLOBULAR: Spherical, compact shape | Usually SOLUBLE | FUNCTIONAL role (enzymatic, transport, hormonal) | Examples: Hemoglobin, Myoglobin, Hexokinase, Insulin.",
  note:"TRAP: Keratin is fibrous but SIMPLE (no prosthetic group). Hemoglobin is globular but CONJUGATED (heme = prosthetic group). Shape and composition classifications are independent." },

{ cat:"classif6", lec:"l6",
  q:"What is hemoglobin's dual classification?",
  a:"Hemoglobin is: 1. GLOBULAR (spherical, compact, soluble) AND 2. CONJUGATED — specifically a CHROMOPROTEIN (prosthetic group = HEME, which contains Fe²⁺). It carries oxygen in blood.",
  note:"Hemoglobin has 4 subunits (quaternary structure), each with one heme group. Total 4 heme groups per Hb molecule → can carry 4 O₂ molecules." },

{ cat:"classif6", lec:"l6",
  q:"Name the 8 functional classes of proteins with examples.",
  a:"A. Enzymatic: Amylase, DNA polymerase | B. Structural: Collagen, Keratin | C. Transport: Hemoglobin (O₂), Albumin | D. Storage: Ferritin (Fe), Casein (milk) | E. Regulatory: Insulin, Glucagon | F. Contractile: Actin, Myosin | G. Protective: Antibodies (immunoglobulins) | H. Toxic/Special: Botulinum toxin, Snake venom",
  note:"TRAP: Actin and Myosin are CONTRACTILE — NOT structural. Ferritin and Casein are STORAGE — NOT transport. Collagen is STRUCTURAL (fibrous) — NOT transport." },

{ cat:"classif6", lec:"l6",
  q:"What are the 3 nutritional classes of proteins?",
  a:"1. COMPLETE proteins: contain ALL essential AAs. Examples: eggs, milk, meat, fish (animal proteins). 2. PARTIALLY COMPLETE: deficient in 1–2 essential AAs. Examples: cereals (wheat, rice — low in lysine). 3. INCOMPLETE: lack SEVERAL essential AAs. Examples: Gelatin, Zein (corn protein).",
  note:"TRAP: Gelatin (from collagen) is INCOMPLETE — it lacks tryptophan and has very low amounts of other essential AAs. It is the classic example of an incomplete protein." },

{ cat:"classif6", lec:"l6",
  q:"Why is gelatin an incomplete protein?",
  a:"Gelatin is derived from COLLAGEN (connective tissue). It lacks the essential amino acid TRYPTOPHAN and is deficient in several others. It CANNOT support growth or body maintenance alone when used as the sole protein source.",
  note:"Collagen/gelatin composition: mainly glycine (33%), proline, hydroxyproline. It lacks many essential AAs because these AAs are not needed in large amounts for structural fibrous protein." },

{ cat:"classif6", lec:"l6",
  q:"What type of protein is collagen and why is it important in dentistry?",
  a:"Collagen is: FIBROUS + SIMPLE + STRUCTURAL protein. Dental relevance: 1. Main organic component of DENTIN (90% of organic matrix). 2. Present in PERIODONTAL LIGAMENT. 3. Present in ALVEOLAR BONE matrix. 4. Scaffold for mineralization during tooth development.",
  note:"Vitamin C deficiency impairs collagen synthesis → SCURVY → bleeding gums, loose teeth. Collagen crosslinking requires Vitamin C (for hydroxylation of proline and lysine)." },

{ cat:"classif6", lec:"l6",
  q:"What is the functional classification of insulin and glucagon?",
  a:"Insulin and glucagon are REGULATORY/SIGNALLING PROTEINS (specifically hormones). Insulin: produced by β-cells of pancreas → lowers blood glucose. Glucagon: produced by α-cells → raises blood glucose. Both are also GLOBULAR proteins.",
  note:"Insulin is also a CONJUGATED protein? NO — it is a SIMPLE protein (only amino acids, no prosthetic group). It is globular and regulatory. Do not confuse functional class with composition class." },

// ═══════════════════ LECTURE 7 — PROTEIN BIOCHEMISTRY PART 4 ═══════════════════

{ cat:"metabolism", lec:"l7",
  q:"What four processes does protein metabolism include?",
  a:"1) Digestion of dietary proteins → amino acids\n2) Absorption & transport of amino acids in body fluids\n3) Utilization of AAs for protein synthesis & nitrogen-containing compounds\n4) Catabolism of excess AAs → deamination → urea excretion",
  note:"Protein metabolism is a CONTINUOUS process — synthesis and degradation occur simultaneously (protein turnover). Unlike carbs and fats, proteins are NOT stored." },

{ cat:"metabolism", lec:"l7",
  q:"Why are proteins NOT stored in the body?",
  a:"There is NO dedicated protein storage form in the body. Unlike glycogen (carbohydrates) or adipose tissue (fats), the body does not store excess protein. Instead, excess amino acids are METABOLIZED via deamination and excreted as urea.",
  note:"This is a fundamental difference from CHO and lipid metabolism. Proteins exist in a state of continuous turnover — old proteins are degraded and replaced, not accumulated." },

{ cat:"metabolism", lec:"l7",
  q:"What is protein turnover?",
  a:"Protein turnover is the continuous cycle of protein SYNTHESIS (anabolism) ↔ protein DEGRADATION (catabolism). It maintains protein quality, removes damaged proteins, and allows rapid adaptation to changing metabolic needs.",
  note:"Rate of turnover varies by protein — liver proteins: every few hours. Structural proteins (collagen): months to years. Hemoglobin: ~120 days (RBC lifespan)." },

{ cat:"metabolism", lec:"l7",
  q:"What is the main nitrogen-containing molecule produced during amino acid catabolism, and how is it disposed of?",
  a:"Excess nitrogen → first released as AMMONIA (NH₃, highly toxic) → liver converts NH₃ to UREA (less toxic) via the urea cycle → urea excreted by KIDNEYS in urine.",
  note:"Ammonia toxicity can cause hepatic encephalopathy (confusion, coma) when liver cannot convert it. Nitrogen disposal = NH₃ → Urea → Kidneys." },

{ cat:"metabolism", lec:"l7",
  q:"Why is nitrogen important in the body?",
  a:"Nitrogen (N) is ESSENTIAL for: amino acids (building proteins), nucleotides (DNA & RNA), neurotransmitters (serotonin, dopamine), and hormones (adrenaline, thyroid hormone). Proteins are the MAIN source of nitrogen in the body.",
  note:"Proteins contain ~16% nitrogen by weight — this is why nitrogen balance is used as a proxy for protein balance in clinical nutrition." },

{ cat:"metabolism", lec:"l7",
  q:"Compare protein metabolism with carbohydrate and lipid metabolism in terms of storage and nitrogen.",
  a:"CHO: stored as glycogen | excess → fat. Lipids: stored as triglycerides in adipose. Proteins: NO storage form | excess → deamination. KEY differences: only proteins contain nitrogen | only proteins have no storage form | only proteins produce urea as end product.",
  note:"Storage comparison: CHO (glycogen, liver+muscle) → Lipids (adipose) → Proteins (NONE). Nitrogen end product is unique to protein catabolism." },

{ cat:"nitrobal", lec:"l7",
  q:"Define Nitrogen Balance and list the three types.",
  a:"Nitrogen Balance = Nitrogen INTAKE (dietary protein) minus Nitrogen EXCRETION (mainly urea).\n• Positive: intake > loss (growth, pregnancy, recovery)\n• Negative: loss > intake (starvation, trauma, illness)\n• Equilibrium (Zero): intake = loss (healthy adult)",
  note:"1 g protein ≈ 0.16 g nitrogen. Nitrogen balance is measured clinically by comparing dietary protein intake with urinary urea nitrogen output." },

{ cat:"nitrobal", lec:"l7",
  q:"In which physiological states does POSITIVE nitrogen balance occur?",
  a:"Positive nitrogen balance (intake > loss) occurs during: GROWTH (children, adolescents), PREGNANCY (building fetal tissue), LACTATION, RECOVERY from illness/surgery/burns. The body is in an ANABOLIC (building) state.",
  note:"In these states, more protein is synthesized than degraded. Dietary protein intake must be increased to support the higher anabolic demand." },

{ cat:"nitrobal", lec:"l7",
  q:"In which states does NEGATIVE nitrogen balance occur, and what does it mean clinically?",
  a:"Negative nitrogen balance (loss > intake): STARVATION, SEVERE ILLNESS, TRAUMA, BURNS, PROLONGED BED REST. The body breaks down its own muscle proteins for energy → muscle wasting. This is a CATABOLIC state.",
  note:"Clinical sign: muscle atrophy, weight loss, impaired wound healing, weak immune system. Corrected by adequate protein intake and treating the underlying condition." },

{ cat:"nitrobal", lec:"l7",
  q:"What is the Amino Acid Pool?",
  a:"The amino acid pool = the total FREE amino acids present in body fluids and cells at any given moment. It is DYNAMIC — constantly replenished (by dietary digestion + protein breakdown) and constantly consumed (for protein synthesis + energy).",
  note:"The amino acid pool is NOT a storage form. Think of it as a 'buffer reservoir' that feeds both anabolic (synthesis) and catabolic (deamination) pathways simultaneously." },

{ cat:"dietary", lec:"l7",
  q:"What is the recommended daily protein requirement for a healthy adult?",
  a:"Healthy adults: 0.8–1.0 g of protein per kg body weight per day. Example: a 70 kg person needs about 56–70 g protein/day.",
  note:"This is the minimum to maintain nitrogen equilibrium. Athletes, bodybuilders, or those in catabolic states may require 1.2–2.0 g/kg/day." },

{ cat:"dietary", lec:"l7",
  q:"Which groups have HIGHER protein requirements than the average adult?",
  a:"Higher requirements: Infants & children (rapid growth), Pregnant women (fetal development), Lactating women (milk production), Adolescents (growth spurt), People with illness/trauma/burns/surgery (tissue repair).",
  note:"Remember: any anabolic or catabolic demand INCREASES protein requirements. Infants have the highest requirement per kg body weight (~1.5–2.0 g/kg/day)." },

{ cat:"digestion", lec:"l7",
  q:"Why must dietary proteins be digested before absorption?",
  a:"Proteins are LARGE, COMPLEX macromolecules that CANNOT be absorbed in their intact form across the intestinal epithelium. They must be broken down into amino acids, dipeptides (2 AAs), and tripeptides (3 AAs) — small enough to cross enterocyte membranes.",
  note:"Intact proteins in the bloodstream would trigger immune responses (allergic reactions). Complete digestion prevents foreign proteins from entering circulation." },

{ cat:"digestion", lec:"l7",
  q:"Does protein digestion begin in the mouth?",
  a:"NO. There are NO protein-digesting enzymes in the mouth (only salivary amylase for starch, and lingual lipase for fats). Protein digestion begins in the STOMACH.",
  note:"EXAM TRAP: This is frequently reversed. Mouth: carbohydrate digestion (amylase). Stomach: protein digestion begins. Small intestine: fat + further protein digestion." },

{ cat:"digestion", lec:"l7",
  q:"What triggers gastric juice secretion and what does gastric juice contain?",
  a:"Proteins entering the stomach stimulate G cells (gastric mucosal cells) to release GASTRIN hormone. Gastrin stimulates secretion of gastric juice containing: HCl + Pepsinogen + Rennin (infants only).",
  note:"The hormone-enzyme sequence: Protein → Gastrin → Gastric juice → HCl + Pepsinogen. HCl then converts pepsinogen to pepsin, which begins protein digestion." },

{ cat:"digestion", lec:"l7",
  q:"What is the pH of gastric juice and why is it important?",
  a:"Gastric juice pH = 1.5–2.5 (highly ACIDIC). This is optimal for: (1) DENATURING dietary proteins (unfolding their 3D structure), (2) ACTIVATING pepsinogen → pepsin, and (3) Creating the optimal environment for pepsin activity.",
  note:"When this acidic chyme reaches the duodenum, Secretin is released to trigger bicarbonate secretion, neutralizing the acid to ~pH 7 for pancreatic enzyme activity." },

{ cat:"digestion", lec:"l7",
  q:"What are the three roles of HCl in protein digestion?",
  a:"1) DENATURES proteins — unfolds 3D structure, exposing peptide bonds to enzyme attack\n2) ACTIVATES pepsinogen → pepsin (by autocatalysis at low pH)\n3) PROVIDES acidic pH (1.5–2.5) optimal for pepsin function",
  note:"HCl does NOT cleave peptide bonds itself — it is NOT a protease. Pepsin is the actual enzyme. This distinction is frequently tested: HCl = denatures + activates; Pepsin = digests." },

{ cat:"digestion", lec:"l7",
  q:"What are the end products of gastric (stomach) protein digestion?",
  a:"Pepsin breaks proteins into: Large polypeptides → Proteoses (intermediate fragments) → Peptones (smaller, soluble fragments). These are NOT free amino acids — further digestion occurs in the small intestine.",
  note:"Sequence in stomach: Intact protein → Large polypeptides → Proteoses → Peptones. Final free amino acids come from intestinal digestion, not stomach." },

{ cat:"digestion", lec:"l7",
  q:"What is Rennin (Chymosin) and where is it found?",
  a:"Rennin is a gastric protease found in INFANTS that coagulates MILK PROTEINS (specifically casein). By clotting milk, it slows gastric emptying and allows more complete digestion of milk protein.",
  note:"Rennin is not significant in adults — pepsin handles milk proteins instead. Rennin (chymosin) is commercially important in CHEESE MAKING, where it is used to coagulate milk." },

{ cat:"digestion", lec:"l7",
  q:"What two intestinal hormones are released when acidic chyme enters the duodenum?",
  a:"1) SECRETIN — released in response to LOW pH of chyme. Stimulates pancreas to secrete BICARBONATE → neutralizes HCl → raises pH from ~2 to ~7.\n2) CCK (Cholecystokinin) — released in response to proteins + fats. Stimulates secretion of PANCREATIC PROTEASES.",
  note:"Memory trick: Secretin → bicarb (neutralize). CCK → enzymes (digest). Both come from duodenal mucosal cells in response to chyme entering the duodenum." },

{ cat:"enzymes", lec:"l7",
  q:"Distinguish between Endopeptidases and Exopeptidases.",
  a:"ENDOPEPTIDASES: cleave INTERNAL peptide bonds within a polypeptide chain → produce smaller fragments. Examples: Pepsin, Trypsin, Chymotrypsin, Elastase.\nEXOPEPTIDASES: remove amino acids from the TERMINAL ends. Aminopeptidase (N-terminus) | Carboxypeptidase (C-terminus).",
  note:"Endo = within (internal bonds). Exo = outside (terminal). Working together: endopeptidases fragment the chain, then exopeptidases strip off individual amino acids from the ends." },

{ cat:"enzymes", lec:"l7",
  q:"What are Zymogens (Proenzymes) and why are proteases secreted in this form?",
  a:"Zymogens are INACTIVE precursor forms of enzymes. Proteases are secreted as zymogens to prevent AUTODIGESTION of the cells that produce them. They become active only when they reach their target site.",
  note:"If proteases were active inside the pancreas, they would digest the pancreatic tissue itself → ACUTE PANCREATITIS. Zymogens are the body's safety mechanism." },

{ cat:"enzymes", lec:"l7",
  q:"Name the four pancreatic zymogens and their corresponding active enzymes.",
  a:"Trypsinogen → Trypsin\nChymotrypsinogen → Chymotrypsin\nProcarboxypeptidase → Carboxypeptidase\nProelastase → Elastase\n(Also: stomach Pepsinogen → Pepsin, activated by HCl)",
  note:"All pancreatic zymogens are activated ULTIMATELY by trypsin. Remember: 'Gen' or 'Pro' prefix = inactive. The active forms drop the prefix." },

{ cat:"enzymes", lec:"l7",
  q:"What are the functions of Trypsin, Chymotrypsin, and Elastase?",
  a:"All three are ENDOPEPTIDASES that cleave internal peptide bonds:\n• Trypsin: cleaves after basic AAs (Lys, Arg) | also the MASTER ACTIVATOR enzyme\n• Chymotrypsin: cleaves after aromatic AAs (Phe, Trp, Tyr)\n• Elastase: breaks bonds in elastic proteins",
  note:"Together they reduce proteins to small peptide fragments. Their combined action ensures complete breakdown of diverse protein types." },

{ cat:"enzymes", lec:"l7",
  q:"What type of enzyme is Carboxypeptidase, and where does it cleave?",
  a:"Carboxypeptidase is an EXOPEPTIDASE. It removes amino acids ONE AT A TIME from the CARBOXYL (C-terminal) END of a peptide chain. Produced from Procarboxypeptidase by trypsin activation.",
  note:"Aminopeptidase (located on intestinal brush border) removes AAs from the N-terminal (amino) end. Together, exopeptidases strip terminal AAs, completing digestion alongside endopeptidases." },

{ cat:"cascade", lec:"l7",
  q:"What enzyme initiates the activation cascade of pancreatic enzymes?",
  a:"ENTEROPEPTIDASE (also called Enterokinase) — located on the BRUSH BORDER of the small intestine. It cleaves and activates Trypsinogen → Trypsin. This is the KEY REGULATORY STEP of the entire cascade.",
  note:"Enteropeptidase is NOT from the pancreas — it is produced by duodenal epithelial cells. Without enteropeptidase, the entire pancreatic enzyme cascade would fail (as seen in rare enteropeptidase deficiency)." },

{ cat:"cascade", lec:"l7",
  q:"Describe the complete Activation Cascade of pancreatic enzymes step by step.",
  a:"Step 1: Pancreas secretes zymogens into duodenum (trypsinogen, chymotrypsinogen, procarboxypeptidase, proelastase)\nStep 2: Enteropeptidase on brush border activates Trypsinogen → Trypsin\nStep 3: Trypsin activates ALL other zymogens + more trypsinogen (autocatalytic)\nStep 4: Active enzymes digest proteins → dipeptides + AAs",
  note:"The cascade is amplified — ONE molecule of enteropeptidase → many trypsin molecules → each trypsin activates many zymogens. This creates a powerful digestive response." },

{ cat:"cascade", lec:"l7",
  q:"Why is Trypsin called the 'Master Activator Enzyme'?",
  a:"Once activated, Trypsin activates ALL other pancreatic zymogens:\n• Chymotrypsinogen → Chymotrypsin\n• Procarboxypeptidase → Carboxypeptidase\n• Proelastase → Elastase\n• More Trypsinogen → more Trypsin (POSITIVE FEEDBACK)\nNo other enzyme has this central activating role.",
  note:"Trypsin is activated FIRST by enteropeptidase, then acts as the central hub. Loss of trypsin function = loss of all pancreatic digestion. That's why enteropeptidase is the master switch." },

{ cat:"cascade", lec:"l7",
  q:"Why do pancreatic zymogens remain INACTIVE while inside the pancreas?",
  a:"Inside the pancreas: no enteropeptidase is present (it's on intestinal brush border), trypsin inhibitor proteins are present to neutralize any accidental activation, and the environment does not favor autocatalysis. They are only activated after entering the duodenum.",
  note:"If zymogens activate prematurely INSIDE the pancreas → trypsin digests pancreatic tissue → ACUTE PANCREATITIS. Clinical presentation: severe abdominal pain, elevated serum amylase and lipase." },

{ cat:"cascade", lec:"l7",
  q:"What are the end products of intestinal protein digestion ready for absorption?",
  a:"After pancreatic + brush border enzymes: proteins are reduced to FREE AMINO ACIDS, DIPEPTIDES (2 AAs), and TRIPEPTIDES (3 AAs). These are small enough to be transported across the enterocyte membrane.",
  note:"Larger peptides are NOT directly absorbed — they require further hydrolysis. The intestinal brush border enzymes (aminopeptidase, dipeptidase) complete the final stages of digestion." },

{ cat:"absorption", lec:"l7",
  q:"Define Amino Acid Absorption.",
  a:"Amino acid absorption = the process by which amino acids, dipeptides, and tripeptides (produced from protein digestion) are transported from the intestinal LUMEN across the EPITHELIAL CELLS (enterocytes) of the small intestine into the BLOODSTREAM.",
  note:"The absorbed amino acids are used for protein synthesis, energy metabolism, and other biosynthetic functions throughout the body." },

{ cat:"absorption", lec:"l7",
  q:"What are the primary and secondary sites of amino acid absorption?",
  a:"PRIMARY site: JEJUNUM — absorbs the MAJORITY of amino acids, dipeptides, and tripeptides. Has abundant transport proteins and a large surface area.\nSECONDARY site: ILEUM — absorbs remaining amino acids. Acts as a backup absorption site.",
  note:"EXAM TRAP: Jejunum = PRIMARY (not duodenum, not ileum). Duodenum is mainly a site of digestion by pancreatic enzymes, not the main absorption site." },

{ cat:"absorption", lec:"l7",
  q:"What is Sodium-Dependent (Secondary Active) Transport of amino acids?",
  a:"1) Na+/K+ ATPase pump keeps intracellular Na+ LOW (using ATP — primary active transport)\n2) Na+ flows back INTO cell down its gradient via CO-TRANSPORT PROTEIN\n3) As Na+ enters, it carries an amino acid against its concentration gradient\n4) Called SECONDARY active transport — energy from Na+ gradient, not direct ATP",
  note:"The Na+/K+ pump is primary active transport (uses ATP directly). Amino acid co-transport is secondary (uses the gradient created by the pump, not ATP directly)." },

{ cat:"absorption", lec:"l7",
  q:"What is the PEPT-1 transporter and what does it transport?",
  a:"PEPT-1 (SLC15A1) is a transporter on the APICAL membrane of enterocytes that absorbs DIPEPTIDES and TRIPEPTIDES (NOT free amino acids). It uses a PROTON (H+) GRADIENT — H+ moves into cell and drives peptide uptake.",
  note:"H+-dependent — NOT Na+-dependent. This is the key distinction. Once inside the cell, the di/tripeptides are hydrolyzed to free AAs by intracellular peptidases before entering blood." },

{ cat:"absorption", lec:"l7",
  q:"Compare Na+-dependent amino acid transport vs. PEPT-1 peptide transport.",
  a:"Na+-dependent: substrate = FREE AMINO ACIDS | ion = Na+ | less efficient\nPEPT-1: substrate = DIPEPTIDES + TRIPEPTIDES | ion = H+ | MORE EFFICIENT (carries 2-3 AAs per transport event)\nBoth: secondary active transport | both on APICAL membrane | neither uses ATP directly",
  note:"PEPT-1 is more efficient because it transports 2-3 amino acids in one transport event vs. one AA at a time for free AA transporters." },

{ cat:"absorption", lec:"l7",
  q:"What is the fate of dipeptides/tripeptides after absorption via PEPT-1?",
  a:"Once inside the enterocyte, absorbed DIPEPTIDES and TRIPEPTIDES are hydrolyzed into FREE AMINO ACIDS by INTRACELLULAR PEPTIDASES. Only FREE amino acids exit the enterocyte through the BASOLATERAL membrane into blood capillaries.",
  note:"No significant peptides appear in the portal blood — essentially all digested protein enters the bloodstream as individual free amino acids." },

{ cat:"absorption", lec:"l7",
  q:"Trace the route of absorbed amino acids from the intestinal lumen to the liver.",
  a:"Lumen → Apical membrane of enterocyte (via Na+-cotransporters or PEPT-1) → Inside enterocyte (peptides hydrolyzed to free AAs) → Basolateral membrane → Blood capillaries → PORTAL VEIN → LIVER (first stop for distribution and metabolism)",
  note:"The LIVER receives all portal blood from the intestine. It acts as the gatekeeper: distributing AAs to other tissues, using them for protein synthesis, or metabolizing them (gluconeogenesis, urea cycle)." },

{ cat:"absorption", lec:"l7",
  q:"What are the two membranes of the enterocyte involved in amino acid transport?",
  a:"APICAL (luminal) membrane: faces the intestinal lumen — site of UPTAKE (Na+-cotransporters for free AAs; PEPT-1 for peptides).\nBASALATERAL membrane: faces blood capillaries — site of EXIT (amino acids leave enterocyte into portal circulation).",
  note:"Think: Apical = In (from gut lumen). Basolateral = Out (into blood). This polarized transport allows directed, one-way flow of nutrients from gut → blood." },

{ cat:"enzymes", lec:"l7",
  q:"Where is pepsin produced and how is it activated?",
  a:"Pepsin is produced by CHIEF CELLS of the stomach mucosa as the ZYMOGEN PEPSINOGEN. It is activated by HCl at low pH (1.5–2.5): HCl denatures pepsinogen → pepsin + autocatalysis (pepsin activates more pepsinogen).",
  note:"This is called AUTOCATALYTIC activation or AUTOACTIVATION. Unlike pancreatic enzymes (activated by enteropeptidase), pepsin is activated by HCl + its own catalytic activity." },

{ cat:"cascade", lec:"l7",
  q:"What clinical condition results from premature activation of pancreatic zymogens inside the pancreas?",
  a:"ACUTE PANCREATITIS — premature intra-pancreatic activation of trypsin causes autodigestion of the pancreatic tissue. Symptoms: SEVERE abdominal pain, nausea, vomiting, elevated serum amylase and lipase.",
  note:"Causes of pancreatitis: gallstones (block pancreatic duct), alcohol, trauma. Understanding zymogens explains WHY zymogens exist — as a protective mechanism against this condition." },

{ cat:"digestion", lec:"l7",
  q:"What is the role of Secretin in protein digestion (indirect role)?",
  a:"Secretin is released by duodenal S-cells when acidic chyme (pH ~1.5-2.5) enters the duodenum. It stimulates the pancreas to secrete BICARBONATE (HCO3-), which NEUTRALIZES the acid, raising intestinal pH from ~2 → ~7. This creates optimal pH for pancreatic enzyme activity.",
  note:"Without secretin/bicarbonate, the acid from the stomach would inactivate pancreatic enzymes (optimal pH 7–8 for most pancreatic proteases). Secretin indirectly enables all intestinal digestion." },

{ cat:"digestion", lec:"l7",
  q:"What is the role of CCK (Cholecystokinin) in protein digestion?",
  a:"CCK is released by duodenal I-cells in response to PROTEINS and FATS in the duodenum. It stimulates: (1) Pancreas to SECRETE DIGESTIVE ENZYMES (trypsinogen, chymotrypsinogen, etc.) (2) Gallbladder to RELEASE BILE (for fat digestion).",
  note:"CCK targets TWO organs: Pancreas (enzymes) and Gallbladder (bile). For protein digestion, CCK's role in releasing pancreatic zymogens is the key action." },

{ cat:"metabolism", lec:"l7",
  q:"What happens to excess amino acids in the body?",
  a:"Excess amino acids CANNOT be stored. They undergo DEAMINATION — the amino group (-NH2) is removed as AMMONIA (NH3). The remaining carbon skeleton (keto acid) is used for: energy (TCA cycle), gluconeogenesis, or fat synthesis. NH3 → Urea → excreted in urine.",
  note:"Deamination is mainly in the LIVER. The carbon skeleton fate depends on the amino acid: some → pyruvate (glucogenic), some → acetyl-CoA (ketogenic), some → TCA intermediates." },

{ cat:"nitrobal", lec:"l7",
  q:"How is nitrogen balance measured clinically?",
  a:"Nitrogen Balance = Nitrogen IN (dietary protein ÷ 6.25) − Nitrogen OUT (mainly urinary urea nitrogen + small losses in feces, sweat, hair). Note: 1 g protein ≈ 0.16 g nitrogen (or 6.25 g protein per 1 g nitrogen).",
  note:"Clinical use: assess nutritional status, monitor recovery from surgery/illness, adjust nutritional support. A patient on TPN (IV nutrition) needs regular nitrogen balance assessment." },

{ cat:"dietary", lec:"l7",
  q:"What is the difference between essential and non-essential amino acids in the context of dietary requirements?",
  a:"ESSENTIAL AAs (9): Cannot be synthesized by the body → MUST come from diet. Mnemonic: PVT TIM HaLL (Phe, Val, Thr, Trp, Ile, Met, His, Leu, Lys).\nNON-ESSENTIAL AAs (11): Can be synthesized by the body from other precursors.",
  note:"Complete proteins (meat, fish, eggs, dairy) contain all 9 essential AAs. Incomplete proteins (most plant sources) lack one or more — vegans must combine plant proteins." },

{ cat:"absorption", lec:"l7",
  q:"Why is PEPT-1 transport considered MORE EFFICIENT than sodium-dependent free amino acid transport?",
  a:"PEPT-1 transports DIPEPTIDES and TRIPEPTIDES in a SINGLE transport event, effectively delivering 2–3 amino acids at once. Na+-dependent transporters carry only ONE free amino acid per event. Same energy expenditure, more amino acids delivered per event.",
  note:"This efficiency explains why partially digested peptides are actually more efficiently absorbed than completely hydrolyzed free AAs. The gut deliberately absorbs some peptides intact." },

{ cat:"enzymes", lec:"l7",
  q:"Which enzymes are located on the BRUSH BORDER of the small intestine?",
  a:"Brush border (microvilli) of enterocytes contains: ENTEROPEPTIDASE (activates trypsinogen), AMINOPEPTIDASE (removes N-terminal AAs from peptides), DIPEPTIDASE (cleaves dipeptides → free AAs). These are the final enzymes completing protein digestion.",
  note:"Brush border enzymes are MEMBRANE-BOUND on enterocytes — they are part of the intestinal wall, not free in the lumen. This is different from pancreatic enzymes, which are secreted into the lumen." },

{ cat:"cascade", lec:"l7",
  q:"What is the 'positive feedback' mechanism of Trypsin activation?",
  a:"Once a small amount of trypsin is formed (by enteropeptidase), TRYPSIN ITSELF cleaves MORE TRYPSINOGEN → more TRYPSIN. This is autocatalytic POSITIVE FEEDBACK — a small initial activation triggers an amplified cascade of trypsin production.",
  note:"This amplification mechanism ensures rapid and complete enzyme activation for efficient digestion. It also explains why even small enteropeptidase activity is sufficient to generate a large amount of trypsin." },

{ cat:"absorption", lec:"l7",
  q:"After amino acids enter the portal vein, what does the liver do with them?",
  a:"The liver is the FIRST organ to receive absorbed amino acids. Liver uses them for: (1) Protein synthesis (plasma proteins: albumin, clotting factors), (2) Gluconeogenesis (during fasting), (3) Urea production (deamination of excess AAs), (4) Distribution to other tissues.",
  note:"The liver acts as the 'traffic controller' for amino acids — keeping what it needs, synthesizing glucose from some, and releasing the rest into systemic circulation for other organs." },

{ cat:"metabolism", lec:"l7",
  q:"What are 'specialized nitrogen-containing compounds' produced from amino acids?",
  a:"Amino acids are precursors for many nitrogen-containing molecules beyond proteins: NUCLEOTIDES (purine + pyrimidine bases for DNA/RNA), NEUROTRANSMITTERS (serotonin from Trp, dopamine from Tyr, GABA from Glu), HORMONES (epinephrine, thyroid hormone), CREATINE (muscle energy), HEME (from Gly).",
  note:"This shows that protein metabolism is not just about building structural proteins — amino acids are essential feedstocks for the entire metabolism. Loss of dietary AAs impacts ALL these pathways." },

{ cat:"digestion", lec:"l7",
  q:"What sequence of events occurs from eating a protein meal to amino acid absorption?",
  a:"1) Protein enters STOMACH → Gastrin released → HCl + Pepsinogen → Pepsin → Proteoses/Peptones\n2) Chyme enters DUODENUM → Secretin → HCO3- neutralization | CCK → pancreatic zymogens\n3) Enteropeptidase → Trypsin cascade → active enzymes digest to AAs/di/tripeptides\n4) JEJUNUM absorbs via PEPT-1 (peptides) + Na+-transport (free AAs) → portal vein → liver",
  note:"This is the complete integration: Mouth (no digestion) → Stomach (begins) → Duodenum (hormones + enzymes) → Jejunum (absorption) → Portal vein → Liver." },

{ cat:"nitrobal", lec:"l7",
  q:"A patient with severe burns is in which type of nitrogen balance, and what is the clinical implication?",
  a:"NEGATIVE nitrogen balance — burns cause massive CATABOLISM (protein breakdown for energy, tissue repair demand exceeds synthesis). Clinical implication: patient needs HIGH PROTEIN intake (1.5–3 g/kg/day) to support wound healing and prevent muscle wasting.",
  note:"Burns are among the most catabolic physiological states known — negative N balance is extreme. Nutritional support (enteral or TPN) with high protein is critical for survival and recovery." },

{ cat:"digestion", lec:"l7",
  q:"How does protein digestion in the STOMACH differ from protein digestion in the SMALL INTESTINE?",
  a:"STOMACH: Acidic (pH 1.5–2.5) | Enzyme: Pepsin (endopeptidase) | End products: proteoses + peptones (large fragments) | Only one protease\nSMALL INTESTINE: Neutral (pH ~7) | Multiple enzymes (trypsin, chymotrypsin, elastase, carboxypeptidase) | End products: AAs + dipeptides + tripeptides",
  note:"The stomach begins digestion but cannot complete it — intestinal enzymes are essential for producing absorbable fragments. Patients without a stomach (gastrectomy) can still digest protein via pancreatic enzymes." },

{ cat:"enzymes", lec:"l7",
  q:"Why are there multiple different proteases (trypsin, chymotrypsin, elastase) in the small intestine rather than just one?",
  a:"Different proteases have DIFFERENT SPECIFICITIES — they cleave at different amino acid sequences. Trypsin: after basic AAs (Lys, Arg). Chymotrypsin: after aromatic AAs (Phe, Trp, Tyr). Elastase: aliphatic AAs. Using multiple enzymes ensures COMPLETE digestion of ALL protein types.",
  note:"A single protease would leave uncut regions resistant to it. Multiple enzymes with complementary specificities ensure no peptide bonds survive. This is the same logic as using multiple restriction enzymes in molecular biology." },

{ cat:"cascade", lec:"l7",
  q:"What is Enteropeptidase (Enterokinase) and why is it called the 'key regulatory step'?",
  a:"Enteropeptidase is an enzyme on the BRUSH BORDER of the small intestine that SPECIFICALLY cleaves trypsinogen → trypsin. It is called the KEY REGULATORY STEP because: (1) Without it, the entire pancreatic protease cascade does not start, (2) It is the RATE-LIMITING initiation point for all intestinal protein digestion.",
  note:"Congenital enteropeptidase deficiency: rare but causes SEVERE protein malabsorption in infants — failure to thrive despite normal pancreatic enzyme secretion, because no trypsin can be activated." },

{ cat:"absorption", lec:"l7",
  q:"What happens to di/tripeptides absorbed by PEPT-1 inside the enterocyte?",
  a:"Inside the enterocyte, INTRACELLULAR PEPTIDASES hydrolyze di- and tripeptides into FREE AMINO ACIDS. Only free amino acids exit via the basolateral membrane into blood capillaries. No significant peptides appear in portal blood.",
  note:"This is important: PEPT-1 absorbs peptides, but they are CONVERTED to free AAs before entering blood. Blood always receives individual amino acids, not peptide chains (under normal conditions)." },

{ cat:"metabolism", lec:"l7",
  q:"What is the nitrogen content of protein, and how is it used to calculate protein intake from nitrogen measurements?",
  a:"Proteins contain approximately 16% nitrogen by weight. Therefore: 1 g nitrogen = 6.25 g protein (1/0.16 = 6.25). This factor (6.25) converts measured urinary nitrogen to estimated dietary protein intake or loss.",
  note:"Clinical application: if a patient excretes 10 g nitrogen in urine/day, they are losing ~62.5 g protein/day. Dietary protein must at least match this to maintain nitrogen equilibrium." },

{ cat:"nitrobal", lec:"l7",
  q:"What is nitrogen equilibrium (zero nitrogen balance) and who typically has it?",
  a:"Nitrogen equilibrium = nitrogen INTAKE exactly equals nitrogen EXCRETION. It means protein synthesis = protein breakdown — no net gain or loss of body protein. Typically seen in: HEALTHY ADULTS with adequate protein intake and no special physiological demands.",
  note:"This is the 'maintenance' state. As soon as demands change (illness, growth, pregnancy, starvation), the balance tips positive or negative. Healthy equilibrium requires consistently adequate dietary protein." },

{ cat:"dietary", lec:"l7",
  q:"What factors determine an individual's dietary protein requirement?",
  a:"Three main factors: (1) AGE — infants and children need more per kg due to growth; elderly may need more due to reduced absorption. (2) PHYSIOLOGICAL STATE — pregnancy, lactation, growth, illness increase needs. (3) HEALTH STATUS — illness, surgery, burns, infections dramatically increase requirements.",
  note:"A one-size-fits-all protein recommendation doesn't work clinically. Always individualize: a 70 kg healthy adult vs. a 70 kg burn patient have vastly different protein needs (0.8 vs. up to 3 g/kg/day)." },

{ cat:"digestion", lec:"l7",
  q:"What is the difference between a Dipeptide and a Tripeptide? Give the clinical significance.",
  a:"DIPEPTIDE: 2 amino acids linked by 1 peptide bond. TRIPEPTIDE: 3 amino acids linked by 2 peptide bonds. Both are small enough to be absorbed via PEPT-1 in the intestine. CLINICAL: di/tripeptide formulas are used in enteral nutrition for patients with impaired digestion — they require less digestive work than intact proteins.",
  note:"Enteral nutrition products come in 3 forms: Polymeric (whole proteins, normal digestion needed), Semi-elemental (peptides, partially digested), Elemental (free AAs, no digestion required). Knowing peptide absorption explains these choices." },

// ── LECTURE 8 — CARBOHYDRATE BIOCHEMISTRY ────────────────────────
{ cat:"carb-intro", lec:"l8",
  q:"What are carbohydrates chemically composed of?",
  a:"Carbohydrates are organic compounds composed of Carbon (C), Hydrogen (H), and Oxygen (O).",
  note:"The name 'carbohydrate' literally means 'hydrates of carbon' because H and O appear in the same 2:1 ratio as water." },
{ cat:"carb-intro", lec:"l8",
  q:"Give the two chemical definitions of carbohydrates.",
  a:"A) Polyhydroxy aldehydes or ketones.\nB) Substances that yield polyhydroxy aldehydes or ketones upon hydrolysis.",
  note:"Both definitions are needed: definition A covers monosaccharides; definition B covers disaccharides and polysaccharides which lack a free carbonyl group." },
{ cat:"carb-intro", lec:"l8",
  q:"What does 'polyhydroxy' mean in the context of carbohydrates?",
  a:"The molecule contains more than one hydroxyl group (–OH) attached to different carbon atoms. These –OH groups make carbohydrates water-soluble and chemically reactive.",
  note:"Example: Glucose dissolves readily in blood precisely because of its multiple –OH groups forming hydrogen bonds with water." },
{ cat:"carb-intro", lec:"l8",
  q:"What is the difference between an aldehyde and a ketone carbonyl group in carbohydrates?",
  a:"Aldehyde (–CHO): carbonyl group (C=O) is at the END of the carbon chain → Aldoses (e.g. Glucose).\nKetone (>C=O): carbonyl group is WITHIN the carbon chain → Ketoses (e.g. Fructose).",
  note:"Glucose is an aldohexose; Fructose is a ketohexose. The position of the carbonyl group determines the sugar's reactivity." },
{ cat:"carb-intro", lec:"l8",
  q:"Why are disaccharides and polysaccharides still classified as carbohydrates even though they lack a free carbonyl group?",
  a:"Because upon hydrolysis (breaking bonds by adding water) they yield polyhydroxy aldehydes or ketones (monosaccharides), satisfying the carbohydrate definition.",
  note:"Sucrose → Glucose + Fructose on hydrolysis. Starch/Glycogen → many Glucose units. The glycosidic bond is broken by hydrolysis." },
{ cat:"carb-intro", lec:"l8",
  q:"What is the empirical formula of carbohydrates and what are its limitations?",
  a:"Traditional formula: Cₙ(H₂O)ₙ — H and O in 2:1 ratio as in water.\nLimitations: 1) Carbohydrates don't actually contain water molecules. 2) Deoxyribose (C₅H₁₀O₄) doesn't fit. 3) Formaldehyde (CH₂O) fits but is NOT a carbohydrate.",
  note:"Glucose → C₆H₁₂O₆ fits the formula. Deoxyribose (C₅H₁₀O₄) is a carbohydrate but doesn't fit — showing the formula's limitation." },
{ cat:"carb-intro", lec:"l8",
  q:"What is hydrolysis and why is it important in carbohydrate chemistry?",
  a:"Hydrolysis = breaking a chemical bond by adding water. It converts complex carbohydrates (disaccharides, polysaccharides) into simpler monosaccharides by breaking glycosidic bonds.",
  note:"This is how digestion works — salivary and pancreatic amylase hydrolyze starch; intestinal disaccharidases hydrolyze sucrose, lactose, and maltose." },
{ cat:"carb-intro", lec:"l8",
  q:"What is a glycosidic bond?",
  a:"A covalent bond that links two monosaccharide units together in disaccharides and polysaccharides. It forms between the anomeric carbon (C1) of one sugar and a hydroxyl group of another, with loss of water.",
  note:"Breaking glycosidic bonds requires specific enzymes (glycosidases) or acid hydrolysis. The bond type (α or β) determines which enzyme can break it." },

// carb-roles
{ cat:"carb-roles", lec:"l8",
  q:"List the four main biological roles of carbohydrates.",
  a:"1. Energy production (immediate fuel)\n2. Energy storage (glycogen)\n3. Structural integrity (glycoproteins, glycolipids, proteoglycans)\n4. Cell recognition and signalling",
  note:"All four roles are clinically relevant: diabetes = energy dysregulation; glycogen storage diseases; mucopolysaccharidoses = structural; ABO blood groups = cell recognition." },
{ cat:"carb-roles", lec:"l8",
  q:"Why is glucose considered the primary energy source of the body?",
  a:"Glucose is oxidized via glycolysis, then further metabolized through the TCA cycle and oxidative phosphorylation to produce rapid and efficient ATP. It is especially vital for the brain, red blood cells, and exercising muscle.",
  note:"The brain uses ~120g glucose/day and cannot use fatty acids directly. RBCs have no mitochondria and rely entirely on glycolysis. This is why hypoglycemia causes neurological symptoms first." },
{ cat:"carb-roles", lec:"l8",
  q:"What are the two major sites of glycogen storage and their specific roles?",
  a:"Liver glycogen: maintains blood glucose levels for the whole body (especially brain/RBCs).\nMuscle glycogen: provides local energy during muscle contraction — NOT released into blood.",
  note:"Liver glycogen (~100g) is broken down by glucagon; muscle glycogen (~400g) is mobilized by epinephrine. Muscle lacks glucose-6-phosphatase, so it can't export glucose." },
{ cat:"carb-roles", lec:"l8",
  q:"What are the structural characteristics of glycogen?",
  a:"Glycogen is a highly branched polysaccharide made of glucose units. The branching allows rapid simultaneous breakdown or synthesis at many sites when energy demand changes quickly.",
  note:"Glycogen is stored with water and potassium in cells. Liver cells (hepatocytes) contain glycogen granules visible by PAS staining — used to diagnose glycogen storage diseases." },
{ cat:"carb-roles", lec:"l8",
  q:"What carbohydrate-containing molecules perform structural roles in the body?",
  a:"Glycoproteins, Glycolipids, and Proteoglycans — found in cell membranes, extracellular matrix, and connective tissue.",
  note:"Proteoglycans (e.g. hyaluronic acid, chondroitin sulfate) make up cartilage and synovial fluid. Glycoproteins include mucins that protect epithelial surfaces." },
{ cat:"carb-roles", lec:"l8",
  q:"How do carbohydrates on cell surfaces function in cell recognition and signalling?",
  a:"Carbohydrates on cell surfaces (as part of glycoproteins and glycolipids) act as recognition markers and receptors for signalling molecules.",
  note:"ABO blood groups are determined by carbohydrate antigens on red blood cells. Lectins recognize and bind specific carbohydrate patterns — important in pathogen-host interactions." },
{ cat:"carb-roles", lec:"l8",
  q:"What are glycoproteins and glycolipids?",
  a:"Glycoproteins: proteins with covalently attached carbohydrate chains — found in cell membranes and secreted proteins (e.g. antibodies, hormones).\nGlycolipids: lipids with carbohydrate groups — key components of the outer cell membrane leaflet.",
  note:"N-linked glycoproteins are attached via asparagine; O-linked via serine/threonine. Disruption of glycosylation causes congenital disorders of glycosylation (CDG)." },
{ cat:"carb-roles", lec:"l8",
  q:"What are proteoglycans and where are they found?",
  a:"Proteoglycans are proteins with large glycosaminoglycan (GAG) chains attached. Found in the extracellular matrix and connective tissue — they provide hydration, cushioning, and structural support.",
  note:"Examples: aggrecan (cartilage), versican, decorin. Heparan sulfate proteoglycans on cell surfaces act as co-receptors for growth factors." },

// carb-classif
{ cat:"carb-classif", lec:"l8",
  q:"What are the four major classes of carbohydrates?",
  a:"1. Monosaccharides (1 sugar unit)\n2. Disaccharides (2 sugar units)\n3. Oligosaccharides (3–10 sugar units)\n4. Polysaccharides (>10, up to thousands of sugar units)",
  note:"Classification is based on number of sugar units and ability to undergo hydrolysis. Monosaccharides CANNOT be hydrolyzed further; all others can." },
{ cat:"carb-classif", lec:"l8",
  q:"Define monosaccharides and give three examples.",
  a:"Monosaccharides consist of ONE sugar unit and cannot be hydrolyzed into simpler sugars (also called simple sugars).\nExamples: Glucose, Fructose, Galactose.",
  note:"These are the building blocks of all other carbohydrates. All three (glucose, fructose, galactose) are hexoses with the same molecular formula C₆H₁₂O₆ but different structures (isomers)." },
{ cat:"carb-classif", lec:"l8",
  q:"Define disaccharides, how are they formed, and give three examples.",
  a:"Disaccharides consist of TWO sugar units linked by a glycosidic bond. Can be hydrolyzed into monosaccharides.\nExamples: Sucrose (glucose + fructose), Lactose (glucose + galactose), Maltose (glucose + glucose).",
  note:"Lactose intolerance = deficiency of lactase enzyme → lactose reaches colon, fermented by bacteria → bloating, diarrhea, gas." },
{ cat:"carb-classif", lec:"l8",
  q:"What are oligosaccharides and what is their main biological significance?",
  a:"Oligosaccharides consist of 3–10 sugar units, can be hydrolyzed into monosaccharides. Commonly found in glycoproteins and glycolipids. Crucial in cell recognition and signalling.",
  note:"Short oligosaccharide chains on glycoproteins serve as cell-type identifiers (e.g. blood group antigens). They are also recognized by lectins in immune responses." },
{ cat:"carb-classif", lec:"l8",
  q:"What are polysaccharides and give two examples?",
  a:"Polysaccharides consist of MORE THAN 10 sugar units (can be hundreds to thousands). Also called complex carbohydrates. Can be hydrolyzed into monosaccharides.\nExamples: Starch (plant energy storage), Cellulose (plant structure).",
  note:"Humans can digest starch (α-1,4 linkages) but NOT cellulose (β-1,4 linkages) — we lack β-glucosidase. Cellulose acts as dietary fiber, aiding gut motility." },
{ cat:"carb-classif", lec:"l8",
  q:"What is the structural difference between starch and glycogen?",
  a:"Both are glucose polymers with α-1,4 linkages and α-1,6 branch points. Glycogen is MORE heavily branched (branch every ~8–12 glucose units) vs starch (every ~24–30). This allows glycogen to be rapidly mobilized.",
  note:"More branch points = more free ends for simultaneous enzymatic action = faster glucose release. This is why glycogen is ideal for rapid energy responses." },
{ cat:"carb-classif", lec:"l8",
  q:"What is sucrose made of and what enzyme breaks it down?",
  a:"Sucrose = Glucose + Fructose linked by an α-1,β-2 glycosidic bond (between their anomeric carbons). Broken down by sucrase (invertase) in the small intestinal brush border.",
  note:"Because both anomeric carbons are linked, sucrose has NO free reducing end — it is a NON-REDUCING sugar. This is clinically important for reducing sugar tests like Benedict's test." },
{ cat:"carb-classif", lec:"l8",
  q:"What is lactose made of and what is the clinical importance of its digestion?",
  a:"Lactose = Glucose + Galactose linked by a β-1,4 glycosidic bond. Broken down by lactase. Lactase deficiency → lactose intolerance → undigested lactose fermented in colon causing gas, bloating, diarrhea.",
  note:"Primary lactase deficiency is common in adults worldwide, especially in Asian and African populations. Secondary lactase deficiency can follow intestinal injury (e.g. gastroenteritis, celiac disease)." },
{ cat:"carb-classif", lec:"l8",
  q:"What is maltose and where is it produced?",
  a:"Maltose = Glucose + Glucose linked by an α-1,4 glycosidic bond. Produced during starch digestion by amylase. Broken down by maltase in the intestinal brush border.",
  note:"Maltose is an intermediate of starch digestion — it accumulates when amylase acts on starch. It is a reducing sugar (has one free anomeric carbon)." },

// monosac
{ cat:"monosac", lec:"l8",
  q:"What are the three criteria used to classify monosaccharides?",
  a:"1. Position of the carbonyl group (aldose vs ketose)\n2. Number of carbon atoms (triose, tetrose, pentose, hexose, heptose)\n3. Both combined (e.g. aldohexose, ketopentose)",
  note:"The combined classification is the most precise: glucose = aldohexose, fructose = ketohexose, ribose = aldopentose, glyceraldehyde = aldotriose." },
{ cat:"monosac", lec:"l8",
  q:"What are aldoses and ketoses? Give one example of each.",
  a:"Aldoses: contain an ALDEHYDE group (–CHO) at C1. Example: Glucose (aldohexose), Galactose.\nKetoses: contain a KETONE group (>C=O) usually at C2. Example: Fructose (ketohexose), Dihydroxyacetone.",
  note:"Fructose is sweet and a ketohexose; it can be converted to glucose-6-phosphate in the liver. Dihydroxyacetone is the simplest ketose (3 carbons)." },
{ cat:"monosac", lec:"l8",
  q:"Classify monosaccharides by carbon number with names and carbon count.",
  a:"Triose → 3C | Tetrose → 4C | Pentose → 5C | Hexose → 6C | Heptose → 7C",

{ cat:"monosac", lec:"l8",
  q:"What is an aldotriose and what is its biological significance?",
  a:"An aldotriose has 3 carbons and an aldehyde group. Example: Glyceraldehyde (D-glyceraldehyde). It is an intermediate in glycolysis and the reference molecule for D/L configuration of sugars.",
  note:"D-Glyceraldehyde is the standard for the D-series. If the –OH on the last chiral carbon (C2 in glyceraldehyde) points RIGHT in Fischer projection → D-sugar (like all biological sugars)." },
{ cat:"monosac", lec:"l8",

{ cat:"monosac", lec:"l8",

{ cat:"monosac", lec:"l8",
  q:"Name the biologically most important pentoses and their roles.",
  a:"Ribose (aldopentose): forms the backbone of RNA and ATP (ribose-5-phosphate).\nDeoxyribose (aldopentose, C₅H₁₀O₄): forms the backbone of DNA — lacks the –OH at C2.",
  note:"Deoxyribose does NOT fit the Cₙ(H₂O)ₙ formula (C₅H₁₀O₄ ≠ C₅(H₂O)₅ = C₅H₁₀O₅) — this is one of the key examples showing the limitation of the empirical formula." },
{ cat:"monosac", lec:"l8",
  q:"What are the three most important hexoses biologically and their formulas?",
  a:"Glucose (C₆H₁₂O₆) — primary energy source.\nFructose (C₆H₁₂O₆) — fruit sugar, ketohexose.\nGalactose (C₆H₁₂O₆) — component of lactose, brain gangliosides.",

{ cat:"monosac", lec:"l8",
  q:"What is Dihydroxyacetone and why is it notable?",
  a:"Dihydroxyacetone is the SIMPLEST KETOSE — a ketotriose with 3 carbons (C₃H₆O₃). It has NO chiral center and is the simplest carbohydrate with a ketone group. It appears in glycolysis as dihydroxyacetone phosphate (DHAP).",
  note:"DHAP is an intermediate in glycolysis, gluconeogenesis, and glycerol metabolism. It is interconverted with glyceraldehyde-3-phosphate by triose phosphate isomerase." },
{ cat:"monosac", lec:"l8",
  q:"What are epimers in carbohydrate chemistry? Give an example.",
  a:"Epimers are monosaccharides that differ in configuration at only ONE specific carbon atom (not the anomeric carbon).\nExample: Glucose and Galactose — identical except at C4 (C4-epimers).",
  note:"Glucose and Mannose are C2-epimers. Epimerization reactions are catalyzed by epimerase enzymes (e.g. UDP-glucose-4-epimerase converts UDP-galactose ↔ UDP-glucose)." },
{ cat:"monosac", lec:"l8",
  q:"What is the difference between D-sugars and L-sugars?",

  note:"D-Glucose is the biological form; L-Glucose exists but is not metabolized by human enzymes. This is analogous to L-amino acids being the biological standard." },

  note:"In solution, glucose exists as ~36% α-D-glucose, ~64% β-D-glucose, and <1% open chain. This interconversion is called MUTAROTATION. β-D-glucose is more stable." },

  note:"Freshly dissolved α-D-glucose has [α]D = +112.2°; β-D-glucose = +18.7°. At equilibrium the mixture reaches +52.7°. The enzyme mutarotase (aldose-1-epimerase) catalyzes this in vivo." },

  note:"All monosaccharides are reducing sugars. Among disaccharides: Maltose ✅ and Lactose ✅ are reducing; Sucrose ❌ is NON-reducing (both anomeric carbons are linked)." },

  note:"Glycogen storage diseases (e.g. Von Gierke's — G6Pase deficiency, Pompe's — acid maltase deficiency) also illustrate what happens when carbohydrate metabolism is disrupted." },
{ cat:"monosac", lec:"l8",
  q:"What is the difference between a pyranose and a furanose ring?",
  a:"Pyranose: 6-membered ring (5C + 1O) — resembles pyran. Example: α-D-glucopyranose.\nFuranose: 5-membered ring (4C + 1O) — resembles furan. Example: β-D-fructofuranose (fructose in sucrose).",
  note:"Pyranose rings are more stable and predominate for 6-carbon aldoses (glucose, galactose). Fructose prefers furanose form when in sucrose. Ribose exists as a furanose in nucleotides." },

]; // end ALL_CARDS

// ── LECTURE COUNTS ───────────────────────────────────────────────
const lecCounts = {all: ALL_CARDS.length};
ALL_CARDS.forEach(c => { lecCounts[c.lec] = (lecCounts[c.lec]||0)+1; });
['all','l34','l5','l6','l7','l8'].forEach(l => {
  const el = document.getElementById('cnt-'+l);
  if(el) el.textContent = '(' + (lecCounts[l]||0) + ')';
});

// ── STATE ────────────────────────────────────────────────────────
let allFiltered = [...ALL_CARDS]; // filtered by lecture
let active = [...ALL_CARDS];      // filtered by lecture + cat
let idx = 0, isFlipped = false;
let known = new Set(), skip = new Set();
let currentLec = 'all';
let currentCat = 'all';

// ── LECTURE FILTER ───────────────────────────────────────────────
function selectLec(lec, btn) {
  currentLec = lec;
  currentCat = 'all';
  document.querySelectorAll('.lec-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  allFiltered = lec === 'all' ? [...ALL_CARDS] : ALL_CARDS.filter(c => c.lec === lec);
  active = [...allFiltered];
  buildCatButtons();
  idx = 0; isFlipped = false;
  document.getElementById('flipBox').classList.remove('flipped');
  known.clear(); skip.clear();
  render();
}

// ── BUILD CATEGORY BUTTONS ────────────────────────────────────────
function buildCatButtons() {
  const catsInView = ['all', ...new Set(allFiltered.map(c => c.cat))];
  const container = document.getElementById('catBtns');
  container.innerHTML = '';
  catsInView.forEach(cat => {
    const count = cat === 'all' ? allFiltered.length : allFiltered.filter(c => c.cat === cat).length;
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === currentCat ? ' active' : '');
    btn.setAttribute('data-cat', cat);
    btn.textContent = (CAT_LABELS[cat] || cat) + ' (' + count + ')';
    btn.onclick = () => filterCat(cat, btn);
    container.appendChild(btn);
  });
}

// ── CATEGORY FILTER ───────────────────────────────────────────────
function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  active = cat === 'all' ? [...allFiltered] : allFiltered.filter(c => c.cat === cat);
  idx = 0; isFlipped = false;
  document.getElementById('flipBox').classList.remove('flipped');
  render();
}

// ── RENDER ────────────────────────────────────────────────────────
function getCard(){ return active[idx]; }

function render(){
  const c = getCard(); if(!c) return;
  document.getElementById('cardQ').textContent    = c.q;
  document.getElementById('cardA').textContent    = c.a;
  document.getElementById('cardNote').textContent = c.note || '';
  const label = CAT_LABELS[c.cat] || c.cat;
  ['cardTag','cardTagB'].forEach(id => {
    const el = document.getElementById(id);
    el.textContent = label;
    el.className = 'face-tag tag-' + c.cat;
  });
  const box = document.getElementById('flipBox');
  box.className = 'flip-container cat-' + c.cat + (isFlipped ? ' flipped' : '');
  const n = idx+1, total = active.length;
  document.getElementById('cardNum').textContent     = 'Card ' + n + ' of ' + total;
  document.getElementById('statCurrent').textContent = n;
  document.getElementById('statTotal').textContent   = total;
  document.getElementById('statKnow').textContent    = known.size;
  document.getElementById('statSkip').textContent    = skip.size;
  const pct = Math.round((n/total)*100);
  document.getElementById('progFill').style.width  = pct+'%';
  document.getElementById('progLeft').textContent  = 'Card ' + n + ' of ' + total;
  document.getElementById('progPct').textContent   = pct+'%';
  renderMini();
}

function flipCard(){ isFlipped = !isFlipped; document.getElementById('flipBox').classList.toggle('flipped', isFlipped); }
function nextCard(){ isFlipped=false; document.getElementById('flipBox').classList.remove('flipped'); if(idx<active.length-1) idx++; render(); }
function prevCard(){ isFlipped=false; document.getElementById('flipBox').classList.remove('flipped'); if(idx>0) idx--; render(); }
function markKnow(){ known.add(idx+'_'+currentCat); nextCard(); }
function markSkip(){ skip.add(idx+'_'+currentCat); nextCard(); }

function shuffleCards(){
  for(let i=active.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [active[i],active[j]]=[active[j],active[i]]; }
  idx=0; isFlipped=false; render();
}
function resetAll(){ known.clear(); skip.clear(); idx=0; isFlipped=false; document.getElementById('flipBox').classList.remove('flipped'); render(); }

function jumpTo(i){ idx=i; isFlipped=false; document.getElementById('flipBox').classList.remove('flipped'); render(); }

function renderMini(){
  const grid = document.getElementById('miniGrid');
  grid.innerHTML = '';
  active.forEach((c,i) => {
    const div = document.createElement('div');
    const done = known.has(i+'_'+currentCat);
    div.className = 'mini-card' + (done?' done':'') + (i===idx?' active':'');
    div.innerHTML = '<span class="mini-num">'+(i+1)+'</span><span>'+c.q.substring(0,28)+'…</span>';
    div.onclick = () => jumpTo(i);
    grid.appendChild(div);
  });
}

document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); isFlipped ? nextCard() : flipCard(); }
  else if(e.key==='ArrowLeft') prevCard();
  else if(e.key==='k') markKnow();
  else if(e.key==='r') markSkip();
});

// Init
buildCatButtons();
render();
</script>
</body>
</html>
